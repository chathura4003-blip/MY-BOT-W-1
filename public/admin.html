<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhatsApp Bot Admin</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;margin:0;background:#0f172a;color:#e2e8f0}main{padding:16px;max-width:1200px;margin:auto}
    .card{background:#111827;padding:12px;border-radius:10px;margin-bottom:12px}
    input,button,select,textarea{padding:8px;border-radius:8px;border:1px solid #374151;background:#1f2937;color:#e5e7eb}
    button{cursor:pointer} .row{display:flex;gap:8px;flex-wrap:wrap} table{width:100%;border-collapse:collapse} td,th{border-bottom:1px solid #334155;padding:6px;text-align:left}
    pre{max-height:260px;overflow:auto;background:#020617;padding:8px;border-radius:8px}
    #app{display:none}
  </style>
</head>
<body>
<main>
  <div id="login" class="card">
    <h2>Admin Login</h2>
    <div class="row">
      <input id="username" placeholder="username" />
      <input id="password" placeholder="password" type="password" />
      <button onclick="login()">Login</button>
    </div>
    <small id="loginError"></small>
  </div>

  <div id="app">
    <div class="card"><h2>Dashboard</h2><div id="status"></div><div class="row" style="margin-top:8px"><input id="publicLink" readonly placeholder="public link" style="min-width:320px"/><button onclick="copyLink()">Copy Link</button></div></div>

    <div class="card">
      <h3>Command Manager</h3>
      <div class="row">
        <input id="cmdName" placeholder="name" />
        <input id="cmdResp" placeholder="response" />
        <select id="cmdPerm"><option>user</option><option>admin</option><option>group</option></select>
        <input id="cmdCooldown" type="number" min="0" placeholder="cooldown" />
        <button onclick="saveCommand()">Save Command</button>
      </div>
      <table id="commandsTable"></table>
    </div>

    <div class="card">
      <h3>Plugin Manager</h3>
      <table id="pluginsTable"></table>
    </div>

    <div class="card">
      <h3>Sessions / Multi-Device</h3>
      <div class="row">
        <input id="sessionLabel" placeholder="New session label" />
        <button onclick="addSession()">Add Session</button>
      </div>
      <table id="sessionsTable"></table>
      <pre id="qr"></pre>
    </div>

    <div class="card">
      <h3>Broadcast</h3>
      <div class="row">
        <input id="broadcastSession" placeholder="sessionId" value="primary" />
        <textarea id="broadcastJids" rows="2" placeholder="jid1,jid2"></textarea>
        <input id="broadcastText" placeholder="message" />
        <button onclick="broadcast()">Send Broadcast</button>
      </div>
    </div>

    <div class="card">
      <h3>Logs (real-time)</h3>
      <pre id="logs"></pre>
    </div>
  </div>
</main>
<script src="/socket.io/socket.io.js"></script>
<script>
  let token='';
  const api = async (url, opts={}) => {
    const r = await fetch(url,{...opts,headers:{'content-type':'application/json','authorization':'Bearer '+token,...(opts.headers||{})}});
    if(!r.ok) throw new Error(await r.text());
    return r.json();
  }
  async function login(){
    try{
      const json = await fetch('/api/auth/login',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({username:username.value,password:password.value})}).then(r=>r.json());
      if(!json.token) throw new Error(json.error||'login failed');
      token=json.token; login.style.display='none'; app.style.display='block'; init();
    }catch(e){loginError.textContent=e.message}
  }
  async function init(){
    await Promise.all([loadStatus(),loadCommands(),loadPlugins(),loadSessions(),loadLogs()]);
    const socket=io();
    socket.on('log',l=>{logs.textContent += `[${l.level}] ${l.message}\n`; logs.scrollTop=logs.scrollHeight;});
    socket.on('status',s=>{status.textContent='Live Sessions: '+JSON.stringify(s,null,2);});
  }
  async function loadStatus(){const d=await api('/api/status');status.textContent=JSON.stringify(d,null,2);publicLink.value=d.panelUrl||''}
  function copyLink(){if(!publicLink.value)return; navigator.clipboard.writeText(publicLink.value); alert('Link copied')}
  async function loadLogs(){const d=await api('/api/logs'); logs.textContent=d.logs.map(x=>`${x.ts} [${x.level}] ${x.message}`).join('\n')}
  async function loadCommands(){
    const d=await api('/api/commands');
    commandsTable.innerHTML='<tr><th>Name</th><th>Perm</th><th>Cooldown</th><th>Action</th></tr>'+d.commands.map(c=>`<tr><td>${c.name}</td><td>${c.permission}</td><td>${c.cooldownSec}</td><td><button onclick="delCommand('${c.name}')">Delete</button></td></tr>`).join('');
  }
  async function saveCommand(){await api('/api/commands',{method:'POST',body:JSON.stringify({name:cmdName.value,response:cmdResp.value,permission:cmdPerm.value,cooldownSec:Number(cmdCooldown.value||0),category:'custom',enabled:true})});loadCommands()}
  async function delCommand(name){await api('/api/commands/'+name,{method:'DELETE'});loadCommands()}
  async function loadPlugins(){
    const d=await api('/api/plugins');
    pluginsTable.innerHTML='<tr><th>ID</th><th>Enabled</th><th>Action</th></tr>'+d.plugins.map(p=>`<tr><td>${p.id}</td><td>${p.enabled}</td><td><button onclick="togglePlugin('${p.id}',${!p.enabled})">${p.enabled?'Disable':'Enable'}</button></td></tr>`).join('');
  }
  async function togglePlugin(id,enabled){await api('/api/plugins/'+id,{method:'PATCH',body:JSON.stringify({enabled})});loadPlugins()}
  async function loadSessions(){
    const d=await api('/api/sessions');
    sessionsTable.innerHTML='<tr><th>ID</th><th>Label</th><th>Active</th><th>Actions</th></tr>'+d.sessions.map(s=>`<tr><td>${s.id}</td><td>${s.label}</td><td>${s.active}</td><td><button onclick="showQr('${s.id}')">QR</button><button onclick="toggleSession('${s.id}',${!s.active})">${s.active?'Stop':'Start'}</button></td></tr>`).join('');
  }
  async function addSession(){await api('/api/sessions',{method:'POST',body:JSON.stringify({label:sessionLabel.value})});loadSessions()}
  async function toggleSession(id,active){await api('/api/sessions/'+id,{method:'PATCH',body:JSON.stringify({active})});loadSessions()}
  async function showQr(id){const d=await api('/api/sessions/'+id+'/qr'); qr.textContent=d.connected?'Connected':(d.qr||'No QR available')}
  async function broadcast(){await api('/api/messages/broadcast',{method:'POST',body:JSON.stringify({sessionId:broadcastSession.value,jids:broadcastJids.value.split(',').map(s=>s.trim()).filter(Boolean),text:broadcastText.value})});alert('Broadcast queued')}
</script>
</body>
</html>
