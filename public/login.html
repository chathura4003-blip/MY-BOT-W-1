<!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Sign In · Chathu MD</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css" />
  </head>
  <body>
    <div id="login">
    <div class="login-mesh">
      <div style="width:500px; height:500px; background:rgba(34,197,94,0.15); top:-100px; left:-100px"></div>
      <div style="width:600px; height:600px; background:rgba(124,58,237,0.12); bottom:-150px; right:-100px"></div>
      <div style="width:400px; height:400px; background:rgba(14,165,233,0.1); top:20%; right:10%"></div>
    </div>
    <div class="login-card">
      <div class="login-brand">
        <div class="login-logo"><svg viewBox="0 0 24 24">
            <path fill="currentColor" d="M13 2L3 14h7l-1 8 10-12h-7l1-8z" />
          </svg></div>
        <h1>Chathu MD</h1>
        <p>Multi-Device Control Center</p>
        <div class="login-tag"><span class="dot"></span>Secure Access</div>
      </div>
      <form id="loginForm" onsubmit="return false">
        <div class="field">
          <label>Username</label>
          <input class="input" id="loginUser" type="text" autocomplete="username" placeholder="admin" required />
        </div>
        <div class="field">
          <label>Password</label>
          <input class="input" id="loginPass" type="password" autocomplete="current-password" placeholder="********"
            required />
        </div>
        <div class="login-error" id="loginErr"></div>
        <button class="btn btn-primary btn-login" id="loginBtn" type="submit">Sign In</button>
      </form>
    </div>
  </div>
    <div id="toasts"></div>
    <div id="topProgress"></div>
    <script src="/js/app.js"></script>
  </body>
  </html>
